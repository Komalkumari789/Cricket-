
<html>
<head>
    <title>Cricket Score Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cricket Score Tracker</h1>

        <h2 id="score">0/0</h2>
        <p>Overs: <span id="overs">0.0</span></p>
        <p>Run Rate: <span id="runrate">0.00</span></p>

        <button onclick="addRun(1)">+1 Run</button>
        <button onclick="addRun(4)">+4 Runs</button>
        <button onclick="addRun(6)">+6 Runs</button>
        <button onclick="addWicket()">Wicket</button>
        <button onclick="addBall()">Dot Ball</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
